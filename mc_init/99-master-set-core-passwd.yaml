# core:growin
apiVersion: machineconfiguration.openshift.io/v1
kind: MachineConfig
metadata:
  labels:
    machineconfiguration.openshift.io/role: master
  name: 99-master-set-core-passwd
spec:
  config:
    ignition:
      version: 3.2.0
    storage:
      files:
      - contents:
          source: data:text/plain;charset=utf-8;base64,JDYkc3NNTWZiYkViMXRITW5mSyRXVmJ3RHNIV01TQjAxWlMwU3JteWl3dEFRZUdQQjllZTlwSDV3TDZPY1VyWUc5SDB5M2gwMlY4UzVoMTVCMzZ4TTlxcFZDcXV6cnF6QUJWTTU1WE9WLgo=
        mode: 420
        overwrite: true
        path: /etc/core.passwd
    systemd:
      units:
      - name: set-core-passwd.service
        enabled: true
        contents: |
          [Unit]
          Description=Set 'core' user password for out-of-band login
          [Service]
          Type=oneshot
          ExecStart=/bin/sh -c 'chpasswd -e < /etc/core.passwd'
          [Install]
          WantedBy=multi-user.target
